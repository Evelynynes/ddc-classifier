<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDC CLASSIFIER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap');
  @font-face {
    font-family: 'GamjaFlower';
    src: url('GamjaFlower-Regular.ttf') format('truetype');
    font-weight: normal; font-style: normal;
  }
  :root{
    --bg:#f0fafa; --panel:#ffffff; --border:#b2dede; --border2:#d4eeee;
    --accent:#0abab5; --accent2:#008080; --text:#1a3333; --text-dim:#7aadad;
    --correct:#0abab5; --wrong:#c0605a;
    --font:'Gamja Flower','GamjaFlower','Noto Sans KR',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

  /* HEADER */
  header{width:100%;max-width:660px;padding:22px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;}
  .logo{font-size:11px;letter-spacing:0.05em;color:var(--text-dim);line-height:1.8;}
  .logo span{display:block;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:0.05em;}
  .lang-toggle{display:flex;gap:2px;background:var(--border2);border-radius:20px;padding:3px;}
  .lang-btn{background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:13px;padding:5px 12px;cursor:pointer;border-radius:18px;transition:all 0.2s;}
  .lang-btn.active{background:var(--accent);color:#fff;font-weight:700;}

  main{width:100%;max-width:660px;padding:18px 24px;flex:1;}
  .screen{display:none;}.screen.active{display:block;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

  /* HOME */
  .home-title{font-size:13px;color:var(--text-dim);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border2);}
  .section-label{font-size:13px;color:var(--text-dim);margin-bottom:10px;}
  .two-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .card{background:var(--panel);border:2px solid var(--border2);border-radius:12px;padding:16px 14px;cursor:pointer;transition:all 0.2s;}
  .card:hover,.card.selected{border-color:var(--accent);}
  .card.selected{background:#e6fafa;}
  .card-badge{font-size:10px;letter-spacing:0.05em;color:var(--accent);margin-bottom:5px;}
  .card-name{font-size:16px;font-weight:700;margin-bottom:3px;}
  .card-desc{font-size:13px;color:var(--text-dim);line-height:1.5;}
  .q-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .q-btn{background:var(--panel);border:2px solid var(--border2);color:var(--text-dim);font-family:var(--font);font-size:15px;padding:8px 18px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
  .q-btn:hover,.q-btn.selected{border-color:var(--accent);color:var(--accent);}
  .start-btn{width:100%;background:var(--accent);border:none;color:#fff;font-family:var(--font);font-size:17px;font-weight:700;padding:16px;border-radius:12px;cursor:pointer;transition:opacity 0.2s;}
  .start-btn:hover{opacity:0.85;}

  /* GAME */
  .progress-bar-wrap{height:6px;background:var(--border2);border-radius:3px;margin-bottom:16px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease;}
  .game-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .q-num{font-size:13px;color:var(--text-dim);}
  .score-row{display:flex;gap:14px;}
  .score-item{font-size:13px;color:var(--text-dim);}
  .score-item .val{color:var(--accent);font-weight:700;}

  /* 책 카드 */
  .book-card{background:var(--panel);border:2px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:14px;}
  .book-lbl{font-size:12px;color:var(--text-dim);margin-bottom:10px;}
  .book-inner{display:flex;gap:14px;align-items:flex-start;}
  .book-cover{width:72px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--border2);aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;}
  .book-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .book-cover-placeholder{font-size:28px;color:var(--text-dim);}
  .book-info{flex:1;min-width:0;}
  .book-title{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:3px;}
  .book-title-ko{font-size:15px;color:var(--accent);margin-bottom:4px;}
  .book-author{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:11px;}
  .book-desc{font-size:14px;line-height:1.7;border-left:3px solid var(--border2);padding-left:11px;color:#3a6666;}

  /* 단계 진행 표시 */
  .steps-wrap{margin-bottom:12px;display:flex;flex-direction:row;gap:8px;flex-wrap:nowrap;overflow-x:auto;}
  .steps-wrap::-webkit-scrollbar{display:none;}
  .step-done{background:#e6fafa;border:2px solid var(--accent);border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;align-items:center;gap:4px;animation:fadeIn 0.3s ease;flex-shrink:0;min-width:90px;text-align:center;}
  .step-done-num{font-size:22px;font-weight:700;color:var(--accent);}
  .step-done-label{font-size:10px;color:var(--text-dim);}
  .step-done-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
  .step-done-check{font-size:16px;color:var(--accent);}

  /* 현재 단계 질문 */
  .step-question{background:var(--panel);border:2px solid var(--border2);border-radius:12px;padding:16px 14px;margin-bottom:12px;}
  .step-hint{font-size:14px;color:var(--text-dim);margin-bottom:12px;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .choice-btn{background:var(--panel);border:2px solid var(--border2);color:var(--text);font-family:var(--font);font-size:14px;padding:12px 13px;border-radius:10px;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4;}
  .choice-btn:hover:not(:disabled){border-color:var(--accent);background:#e6fafa;}
  .choice-btn.correct{border-color:var(--correct);background:#e6fafa;color:var(--correct);}
  .choice-btn.wrong{border-color:var(--wrong);background:#fdf0ef;color:var(--wrong);}
  .choice-btn:disabled{cursor:default;}
  .choice-num{font-size:11px;color:var(--text-dim);display:block;margin-bottom:2px;}

  /* 오답 설명 */
  .wrong-explain{background:#fdf0ef;border:2px solid var(--wrong);border-radius:10px;padding:14px 16px;margin-top:10px;display:none;animation:fadeIn 0.3s ease;}
  .wrong-explain.show{display:block;}
  .wrong-explain-title{font-size:15px;font-weight:700;color:var(--wrong);margin-bottom:6px;}
  .wrong-explain-body{font-size:14px;line-height:1.7;color:#7a3030;}
  .wrong-explain-answer{font-size:15px;font-weight:700;color:var(--wrong);margin-top:8px;padding-top:8px;border-top:1px solid #f0c0be;}

  .next-btn{width:100%;background:none;border:2px solid var(--border2);color:var(--text-dim);font-family:var(--font);font-size:15px;padding:13px;border-radius:12px;cursor:pointer;transition:all 0.2s;display:none;margin-top:10px;}
  .next-btn.show{display:block;}
  .next-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* RESULT */
  .result-wrap{text-align:center;padding:14px 0;}
  .result-label{font-size:13px;color:var(--text-dim);margin-bottom:10px;}
  .result-score{font-size:68px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:5px;}
  .result-total{font-size:14px;color:var(--text-dim);margin-bottom:28px;}
  .result-bars{margin-bottom:24px;text-align:left;}
  .rbi{display:grid;grid-template-columns:50px 1fr 28px;gap:8px;align-items:center;margin-bottom:7px;}
  .rbi-num{font-size:12px;color:var(--text-dim);}
  .rbi-bar-wrap{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
  .rbi-bar{height:100%;border-radius:3px;transition:width 0.8s ease;}
  .rbi-bar.hit{background:var(--correct);}.rbi-bar.miss{background:var(--wrong);}
  .rbi-mark{font-size:13px;text-align:right;}
  .rbi-mark.hit{color:var(--correct);}.rbi-mark.miss{color:var(--wrong);}
  .result-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .retry-btn{background:var(--accent);border:none;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer;transition:opacity 0.2s;}
  .retry-btn:hover{opacity:0.85;}
  .home-btn{background:none;border:2px solid var(--border2);color:var(--text-dim);font-family:var(--font);font-size:15px;padding:14px;border-radius:12px;cursor:pointer;transition:all 0.2s;}
  .home-btn:hover{border-color:var(--accent);color:var(--accent);}
  hr.div{border:none;border-top:1px solid var(--border2);margin:18px 0;}
  footer{width:100%;max-width:660px;padding:12px 24px 22px;font-size:12px;color:var(--text-dim);border-top:1px solid var(--border2);display:flex;justify-content:space-between;}
  @media(max-width:480px){.two-grid,.choices,.result-btns{grid-template-columns:1fr;}.result-score{font-size:52px;}}
</style>
</head>
<body>
<header>
  <div class="logo"><span>DDC</span>CLASSIFIER</div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">ENG</button>
    <button class="lang-btn" onclick="setLang('mn')" id="btn-mn">МОН</button>
  </div>
</header>
<main>
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <p class="home-title" id="txt-subtitle">DDC 분류 실습 게임</p>
    <p class="section-label" id="txt-mode-label">// 게임 모드</p>
    <div class="two-grid">
      <div class="card selected" id="card-mode-drill" onclick="selectMode('drill')">
        <div class="card-badge">DRILL</div>
        <div class="card-name" id="txt-mode-drill-name">단계별 분류</div>
        <div class="card-desc" id="txt-mode-drill-desc">주류 → 강 → 요목<br>단계적으로 좁혀가기</div>
      </div>
      <div class="card" id="card-mode-quick" onclick="selectMode('quick')">
        <div class="card-badge">QUICK</div>
        <div class="card-name" id="txt-mode-quick-name">바로 선택</div>
        <div class="card-desc" id="txt-mode-quick-desc">책 보고 번호<br>한 번에 고르기</div>
      </div>
    </div>
    <p class="section-label" id="txt-qcount-label">// 문제 수</p>
    <div class="q-btns">
      <button class="q-btn" onclick="selectQ(3)">3</button>
      <button class="q-btn selected" onclick="selectQ(5)">5</button>
      <button class="q-btn" onclick="selectQ(10)">10</button>
    </div>
    <button class="start-btn" onclick="startGame()" id="txt-start">▶ 게임 시작</button>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="game-meta">
      <span class="q-num" id="q-counter">Q 1 / 5</span>
      <div class="score-row">
        <span class="score-item"><span id="lbl-correct">정답</span> <span class="val" id="score-correct">0</span></span>
        <span class="score-item"><span id="lbl-streak">연속</span> <span class="val" id="score-streak">0</span></span>
      </div>
    </div>
    <!-- 책 카드 -->
    <div class="book-card" id="book-card"></div>
    <!-- 확정된 단계들 -->
    <div class="steps-wrap" id="steps-wrap"></div>
    <!-- 현재 단계 선택지 -->
    <div class="step-question" id="step-question">
      <div class="step-hint" id="step-hint"></div>
      <div class="choices" id="choices"></div>
      <div class="wrong-explain" id="wrong-explain">
        <div class="wrong-explain-title" id="we-title">❌ 오답</div>
        <div class="wrong-explain-body" id="we-body"></div>
        <div class="wrong-explain-answer" id="we-answer"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextStep()">다음 →</button>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-wrap">
      <p class="result-label" id="txt-result-label">결과</p>
      <div class="result-score" id="result-score">0</div>
      <div class="result-total" id="result-total">/ 5</div>
      <hr class="div">
      <div class="result-bars" id="result-bars"></div>
      <div class="result-btns">
        <button class="retry-btn" onclick="retryGame()" id="txt-retry">▶ 다시하기</button>
        <button class="home-btn" onclick="goHome()" id="txt-home">⌂ 홈으로</button>
      </div>
    </div>
  </div>
</main>
<footer>
  <span>DDC 23rd Edition</span>
  <span id="footer-credit">도서관 분류 실습 게임</span>
</footer>

let lang='ko', mode='drill', totalQ=5;
let questions=[], currentQ=0, correctCount=0, streak=0;
let currentStep=0; // 0=class, 1=div, 2=sec

function setLang(l){
  lang=l;
  ['ko','en','mn'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===l));
  applyStrings();

  // 게임 화면이 열려 있으면 즉시 재렌더링
  const gameScreen=document.getElementById('screen-game');
  if(gameScreen.classList.contains('active') && questions.length>0){
    // 책 카드 설명 언어 변경
    renderBookCard();
    // 힌트 텍스트 변경
    const hintKey=mode==='drill'
      ?(currentStep===0?'hintClass':currentStep===1?'hintDiv':'hintSec')
      :'hintQuick';
    document.getElementById('step-hint').textContent=T(hintKey);
    // 선택지 버튼 이름 변경 (아직 답 안 고른 상태만)
    const btns=document.querySelectorAll('.choice-btn');
    btns.forEach(btn=>{
      const numEl=btn.querySelector('.choice-num');
      if(!numEl) return;
      const num=numEl.textContent;
      const d=DDC_ALL[num];
      if(d) btn.innerHTML=`<span class="choice-num">${num}</span>${getName(d)}`;
    });
    // 확정된 단계(step-done) 이름 변경
    document.querySelectorAll('.step-done').forEach(el=>{
      const numEl=el.querySelector('.step-done-num');
      const nameEl=el.querySelector('.step-done-name');
      if(!numEl||!nameEl) return;
      const d=DDC_ALL[numEl.textContent.trim()];
      if(d) nameEl.textContent=getName(d);
    });
    // 오답 설명이 표시 중이면 다시 렌더
    const we=document.getElementById('wrong-explain');
    if(we.classList.contains('show')){
      const answerEl=document.getElementById('we-answer');
      if(answerEl){
        const match=answerEl.textContent.match(/(\d{3})/);
        if(match) showWrongExplain(match[1], currentStep);
      }
    }
    // 점수 레이블
    document.getElementById('lbl-correct').textContent=T('correct');
    document.getElementById('lbl-streak').textContent=T('streak');
    // 다음 버튼 텍스트
    const nb=document.getElementById('next-btn');
    if(nb.classList.contains('show'))
      nb.textContent=T('nextBtn');
  }

  // 결과 화면이 열려 있으면 레이블만 변경
  const resultScreen=document.getElementById('screen-result');
  if(resultScreen.classList.contains('active')){
    document.getElementById('txt-result-label').textContent=T('resultLabel');
    document.getElementById('result-total').textContent=`/ ${totalQ} ${T('resultSuffix')}`;
    document.getElementById('txt-retry').textContent=T('retry');
    document.getElementById('txt-home').textContent=T('home');
  }
}
function T(k){ return (S[lang]&&S[lang][k])||S['en'][k]||''; }
function setText(id,k){ const el=document.getElementById(id); if(el) el.textContent=T(k); }
function getName(d){ return lang==='ko'?d.ko:lang==='en'?d.en:d.mn; }
function getReason(d){ return lang==='ko'?d.reason_ko:lang==='en'?d.reason_en:d.reason_mn; }
function applyStrings(){
  setText('txt-subtitle','subtitle'); setText('txt-mode-label','modeLabel');
  setText('txt-mode-drill-name','modeDrillName'); setText('txt-mode-drill-desc','modeDrillDesc');
  setText('txt-mode-quick-name','modeQuickName'); setText('txt-mode-quick-desc','modeQuickDesc');
  setText('txt-qcount-label','qcountLabel'); setText('txt-start','start');
  setText('lbl-correct','correct'); setText('lbl-streak','streak');
  setText('txt-result-label','resultLabel'); setText('txt-retry','retry');
  setText('txt-home','home'); setText('footer-credit','footer');
}

// ═══════════════════════════════════════
// HOME
// ═══════════════════════════════════════
function selectMode(m){
  mode=m;
  document.getElementById('card-mode-drill').classList.toggle('selected',m==='drill');
  document.getElementById('card-mode-quick').classList.toggle('selected',m==='quick');
}
function selectQ(n){
  totalQ=n;
  document.querySelectorAll('.q-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.textContent)===n));
}

// ═══════════════════════════════════════
// GAME
// ═══════════════════════════════════════
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }

function startGame(){
  questions=shuffle(BOOKS).slice(0,totalQ);
  currentQ=0; correctCount=0; streak=0; resultLog=[];
  showScreen('game');
  loadQuestion();
}

function loadQuestion(){
  currentStep=0; stepAnswers=[]; questionCorrect=true;
  document.getElementById('progress-fill').style.width=((currentQ/totalQ)*100)+'%';
  document.getElementById('q-counter').textContent=`Q ${currentQ+1} / ${totalQ}`;
  document.getElementById('score-correct').textContent=correctCount;
  document.getElementById('score-streak').textContent=streak;
  document.getElementById('steps-wrap').innerHTML='';
  document.getElementById('wrong-explain').className='wrong-explain';
  document.getElementById('next-btn').className='next-btn';
  renderBookCard();
  renderStep();
}

function renderBookCard(){
  const book=questions[currentQ];
  const desc=lang==='ko'?book.desc_ko:lang==='en'?book.desc_en:book.desc_mn;
  const cardEl=document.getElementById('book-card');

  // 일단 placeholder로 먼저 렌더
  cardEl.innerHTML=`
    <div class="book-lbl">${T('bookLbl')}</div>
    <div class="book-inner">
      <div class="book-cover" id="cover-wrap"><span class="book-cover-placeholder">📖</span></div>
      <div class="book-info">
        <div class="book-title">${book.title}</div>
        <div class="book-title-ko">${book.title_ko}</div>
        <div class="book-author">${book.author}</div>
        <div class="book-desc">${desc}</div>
      </div>
    </div>`;

  // Google Books API로 표지 비동기 로드
  if(book.isbn){
    fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${book.isbn}&fields=items(volumeInfo/imageLinks)`)
      .then(r=>r.json())
      .then(data=>{
        const img=data?.items?.[0]?.volumeInfo?.imageLinks;
        const url=img?.thumbnail||img?.smallThumbnail;
        if(url){
          const wrap=document.getElementById('cover-wrap');
          if(wrap) wrap.innerHTML=`<img src="${url.replace('http://','https://')}" alt="cover" onerror="this.parentElement.innerHTML='<span class=\\'book-cover-placeholder\\'>📖</span>'">`;
        }
      })
      .catch(()=>{});
  }
}

function renderStep(){
  const book=questions[currentQ];
  const sec=book.section;
  const correctClass=getClass(sec);
  const correctDiv=getDiv(sec);

  let hint='', choices=[], correctNum='';

  if(mode==='drill'){
    if(currentStep===0){
      hint=T('hintClass');
      correctNum=correctClass;
      // 주류 선택지: 800 포함 4개 랜덤
      const others=shuffle(['000','100','200','300','400','500','600','700','900']).slice(0,3);
      choices=shuffle([correctClass,...others]);
    } else if(currentStep===1){
      hint=T('hintDiv');
      correctNum=correctDiv;
      // 해당 주류의 강 선택지
      const divList=Object.keys(DDC_ALL).filter(k=>k.length===3&&k[2]==='0'&&k!==correctClass&&k[0]===sec[0]);
      const others=shuffle(divList).slice(0,3);
      choices=shuffle([correctDiv,...others]);
    } else {
      hint=T('hintSec');
      correctNum=sec;
      // 해당 강의 요목 선택지
      const secList=Object.keys(DDC_ALL).filter(k=>k.length===3&&k[2]!=='0'&&k[0]===sec[0]&&k[1]===sec[1]&&k!==sec);
      const others=shuffle(secList).slice(0,3);
      if(others.length<3){
        // 같은 주류 다른 강에서 보충
        const extra=Object.keys(DDC_ALL).filter(k=>k.length===3&&k[2]!=='0'&&k[0]===sec[0]&&k!==sec&&!others.includes(k));
        others.push(...shuffle(extra).slice(0,3-others.length));
      }
      choices=shuffle([sec,...others.slice(0,3)]);
    }
  } else {
    // QUICK 모드: 바로 섹션
    hint=T('hintQuick');
    correctNum=sec;
    const others=shuffle(Object.keys(DDC_ALL).filter(k=>k.length===3&&k[2]!=='0'&&k!==sec)).slice(0,3);
    choices=shuffle([sec,...others]);
  }

  // 선택지 렌더
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  choices.forEach(num=>{
    const d=DDC_ALL[num];
    const name=d?getName(d):'?';
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-num">${num}</span>${name}`;
    btn.onclick=()=>selectAnswer(btn,num,correctNum,currentStep);
    choicesEl.appendChild(btn);
  });

  document.getElementById('step-hint').textContent=hint;
  document.getElementById('wrong-explain').className='wrong-explain';
  document.getElementById('next-btn').className='next-btn';
}

function selectAnswer(btn,chosen,correct,step){
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect=chosen===correct;

  if(isCorrect){
    btn.classList.add('correct');
    // 확정 단계 추가
    addStepDone(step, correct);
    document.getElementById('wrong-explain').className='wrong-explain';

    // 다음 단계 or 문제 종료
    const isFinalStep=(mode==='quick')||(mode==='drill'&&(
      (step===2)||(step===1&&!SECS[correct])||( step===0&&!DIVS[getClass(correct)])
    ));

    if(mode==='drill'&&step<2&&!isFinalStep){
      currentStep++;
      // 잠깐 후 다음 단계 렌더
      setTimeout(()=>{
        renderStep();
      },600);
    } else {
      // 문제 완료
      if(questionCorrect){ correctCount++; streak++; }
      document.getElementById('score-correct').textContent=correctCount;
      document.getElementById('score-streak').textContent=streak;
      resultLog.push({title:questions[currentQ].title_ko,hit:questionCorrect});
      const nb=document.getElementById('next-btn');
      nb.textContent=currentQ+1<totalQ?T('nextBtnFinal'):T('retry');
      nb.className='next-btn show';
    }
  } else {
    btn.classList.add('wrong');
    questionCorrect=false;
    streak=0;
    // 정답 하이라이트
    document.querySelectorAll('.choice-btn').forEach(b=>{
      const numEl=b.querySelector('.choice-num');
      if(numEl&&numEl.textContent===correct) b.classList.add('correct');
    });
    // 오답 설명 표시
    showWrongExplain(correct, step);
    const nb=document.getElementById('next-btn');
    nb.textContent=T('nextBtn');
    nb.className='next-btn show';
  }
}

function addStepDone(step, num){
  const d=DDC_ALL[num];
  const name=d?getName(d):'';
  const labels=[T('stepLabelClass'),T('stepLabelDiv'),T('stepLabelSec')];
  const label=mode==='quick'?T('stepLabelSec'):labels[step];
  const wrap=document.getElementById('steps-wrap');
  const div=document.createElement('div');
  div.className='step-done';
  div.setAttribute('data-num', num);
  div.innerHTML=`<div class="step-done-check">✓</div>
    <div class="step-done-num">${num}</div>
    <div class="step-done-label">${label}</div>
    <div class="step-done-name">${name}</div>`;
  wrap.appendChild(div);
}

function showWrongExplain(correct, step){
  const d=DDC_ALL[correct];
  if(!d) return;
  const we=document.getElementById('wrong-explain');
  document.getElementById('we-title').textContent=T('wrongTitle');
  // 틀린 이유 설명
  let body='';
  if(step===0) body=lang==='ko'?'주류는 세 자리 번호의 첫째 자리로 결정됩니다. ':lang==='en'?'The main class is determined by the first digit of the DDC number. ':'Үндсэн ангилал нь DDC дугаарын эхний цифрээр тодорхойлогдоно. ';
  else if(step===1) body=lang==='ko'?'강(Division)은 두 번째 자리로 결정됩니다. ':lang==='en'?'The division is determined by the second digit. ':'Хэсэг нь хоёр дахь цифрээр тодорхойлогдоно. ';
  else body=lang==='ko'?'요목(Section)은 세 번째 자리로 결정됩니다. ':lang==='en'?'The section is the full three-digit number. ':'Дэд хэсэг нь гурван оронтой бүхэл тоогоор тодорхойлогдоно. ';
  body+=getReason(d);
  document.getElementById('we-body').textContent=body;
  document.getElementById('we-answer').textContent=(lang==='ko'?'정답: ':lang==='en'?'Answer: ':'Зөв хариулт: ')+correct+' — '+getName(d);
  we.className='wrong-explain show';
}

function nextStep(){
  // 오답 후 다음 단계 or 다음 문제
  const book=questions[currentQ];
  const sec=book.section;
  const isAnswered=document.querySelectorAll('.choice-btn.correct, .choice-btn.wrong').length>0;
  const wasCorrect=document.querySelector('.choice-btn.wrong')===null;

  if(!wasCorrect){
    // 오답 후: 다음 단계 or 다음 문제
    if(mode==='drill'&&currentStep<2){
      currentStep++;
      document.getElementById('wrong-explain').className='wrong-explain';
      document.getElementById('next-btn').className='next-btn';
      renderStep();
    } else {
      resultLog.push({title:book.title_ko,hit:false});
      currentQ++;
      if(currentQ>=totalQ) showResult();
      else loadQuestion();
    }
  } else {
    currentQ++;
    if(currentQ>=totalQ) showResult();
    else loadQuestion();
  }
}

// ═══════════════════════════════════════
// RESULT
// ═══════════════════════════════════════
function showResult(){
  document.getElementById('progress-fill').style.width='100%';
  showScreen('result');
  document.getElementById('txt-result-label').textContent=T('resultLabel');
  document.getElementById('result-score').textContent=correctCount;
  document.getElementById('result-total').textContent=`/ ${totalQ} ${T('resultSuffix')}`;
  document.getElementById('txt-retry').textContent=T('retry');
  document.getElementById('txt-home').textContent=T('home');
  const barsEl=document.getElementById('result-bars');
  barsEl.innerHTML='';
  resultLog.forEach(r=>{
    const d=document.createElement('div'); d.className='rbi';
    d.innerHTML=`<span class="rbi-num" style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.title}</span>
      <div class="rbi-bar-wrap"><div class="rbi-bar ${r.hit?'hit':'miss'}" style="width:${r.hit?100:28}%"></div></div>
      <span class="rbi-mark ${r.hit?'hit':'miss'}">${r.hit?'✓':'✗'}</span>`;
    barsEl.appendChild(d);
  });
}
function retryGame(){ startGame(); }
function goHome(){ showScreen('home'); }
function showScreen(n){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+n).classList.add('active'); }

// INIT
applyStrings();
</script>
